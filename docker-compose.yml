name: imperium-news-streaming-platform

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - imperium-net

services:
  foundation-shell:
    <<: *service-defaults
    image: alpine:3.20
    container_name: imperium-foundation-shell
    profiles:
      - foundation
    command: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]
    env_file:
      - ${ENV_FILE:-.env}
    healthcheck:
      test: ["CMD-SHELL", "test -f /etc/alpine-release"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - foundation-shell-data:/workspace

  kafka:
    <<: *service-defaults
    image: ${KAFKA_IMAGE}
    container_name: imperium-kafka-1
    hostname: kafka
    profiles:
      - backbone
    ports:
      - "${KAFKA_EXTERNAL_PORT:-49092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_EXTERNAL_PORT:-49092}
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-2}
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-2}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_REPLICATION_FACTOR:-2}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_MIN_INSYNC_REPLICAS:-2}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: ${KAFKA_LOG_RETENTION_HOURS:-168}
      KAFKA_LOG_RETENTION_BYTES: ${KAFKA_LOG_RETENTION_BYTES:-5368709120}
      KAFKA_LOG_SEGMENT_BYTES: ${KAFKA_LOG_SEGMENT_BYTES:-536870912}
      KAFKA_COMPRESSION_TYPE: ${KAFKA_COMPRESSION_TYPE:-lz4}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-1-data:/var/lib/kafka/data

  kafka-broker-2:
    <<: *service-defaults
    image: ${KAFKA_IMAGE}
    container_name: imperium-kafka-2
    hostname: kafka-broker-2
    profiles:
      - backbone
    ports:
      - "${KAFKA_BROKER2_EXTERNAL_PORT:-49093}:9093"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-broker-2:29092,PLAINTEXT_HOST://localhost:${KAFKA_BROKER2_EXTERNAL_PORT:-49093}
      KAFKA_LISTENERS: PLAINTEXT://kafka-broker-2:29092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_HEAP_OPTS: ${KAFKA_HEAP_OPTS}
      KAFKA_COMPRESSION_TYPE: ${KAFKA_COMPRESSION_TYPE:-lz4}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9093 > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    volumes:
      - kafka-2-data:/var/lib/kafka/data

  schema-registry:
    <<: *service-defaults
    image: ${KARAPACE_IMAGE}
    container_name: imperium-schema-registry
    hostname: schema-registry
    profiles:
      - backbone
    command: ["python3", "-m", "karapace"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-broker-2:
        condition: service_healthy
    ports:
      - "${SCHEMA_REGISTRY_EXTERNAL_PORT:-48081}:8081"
    environment:
      KARAPACE_ADVERTISED_HOSTNAME: schema-registry
      KARAPACE_BOOTSTRAP_URI: kafka:29092,kafka-broker-2:29092
      KARAPACE_HOST: 0.0.0.0
      KARAPACE_PORT: 8081
      KARAPACE_COMPATIBILITY: ${SCHEMA_REGISTRY_COMPATIBILITY:-BACKWARD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8081/subjects > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

networks:
  imperium-net:
    name: imperium-net
    driver: bridge

volumes:
  foundation-shell-data:
    name: imperium-foundation-shell-data
  kafka-1-data:
    name: imperium-kafka-1-data
  kafka-2-data:
    name: imperium-kafka-2-data
  connect-data:
    name: imperium-connect-data
  redis-data:
    name: imperium-redis-data
  qdrant-data:
    name: imperium-qdrant-data
  spark-master-data:
    name: imperium-spark-master-data
  spark-worker-1-data:
    name: imperium-spark-worker-1-data
